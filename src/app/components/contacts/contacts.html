<section class="contacts">

    <div class="contact-list" [class.hidden-mobile]="selectedUser">
        <div class="contact-button">
            <button class="primary-button"><span>Add new contact</span>
                <app-svg-db name="person-add"></app-svg-db>
            </button>
        </div>
        @for (user of supaDatabase.demoDaten(); track user; let i = $index) {
        @if (i === 0 || user.name[0].toUpperCase() !== supaDatabase.demoDaten()[i-1].name[0].toUpperCase()) {
        <div class="letter-separator">
            {{ user.name[0].toUpperCase() }}
        </div>
        }
        <div [class.selected-contact]="selectedUser == user" (click)="showDetails(user)" class="contact-info">
            <p class="user-badge" [style.backgroundColor]="userBadgeService.getColor(user.id)">
                {{ userBadgeService.getInitials(user.name) }}
            </p>
            <div class="short-info">
                <p>{{user.name}}</p>
                <p class="contact-info-email">{{user.email}}</p>
            </div>
        </div>
        }
    </div>
    <app-contacts-details [selectedUser]="selectedUser" [class.visible-mobile]="selectedUser"
        (backToMain)="selectedUser = null">
    </app-contacts-details>

</section>
